<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Proje Adı | CMS 360</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0b0b0b;
  font-family: Helvetica, Arial, sans-serif;
  color: white;
}

/* 360 */
#panorama {
  width: 100%;
  height: 100vh;
}

/* BRAND */
.brand {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 999;
  background: rgba(0,0,0,0.4);
  padding: 10px 14px;
  border-radius: 8px;
  backdrop-filter: blur(8px);
  font-size: 14px;
  letter-spacing: 1px;
}

/* UI */
.ui {
  position: absolute;
  top: 70px;
  left: 20px;
  z-index: 999;
  background: rgba(0,0,0,0.4);
  padding: 10px 14px;
  border-radius: 8px;
  backdrop-filter: blur(8px);
}

.ui .title {
  font-size: 15px;
  font-weight: bold;
  letter-spacing: 1px;
}

.ui .subtitle {
  font-size: 13px;
  opacity: 0.8;
  margin-top: 4px;
}

/* FULLSCREEN */
.fs {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 999;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 20px;
}

/* PLAN (Responsive) */
#plan-wrapper {
  position: absolute;
  bottom: 90px; /* Menünün üstünde durması için */
  left: 20px;
  z-index: 20;
  width: 150px; /* Mobilde biraz daha küçük */
  max-width: 30%;
}

#plan {
  width: 100%;
  display: block;
}

#planNodes {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
}

.node {
  position: absolute;
  width: 12px;
  height: 12px;
  background: red;
  border-radius: 50%;
  cursor: pointer;
  opacity: 0.85;
  transform: translate(-50%, -50%); /* Noktayı tam merkeze alır */
  box-shadow: 0 0 5px rgba(0,0,0,0.5);
  transition: transform 0.2s;
}

.node:hover {
  transform: translate(-50%, -50%);
}

/* BOTTOM NAV (Dokunmatik ekran uyumlu) */
.bottom-nav {
  position: absolute;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;

  display: flex;
  gap: 15px; /* Mobilde sığması için boşlukları azalttık */

  padding: 8px 15px;
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  backdrop-filter: blur(8px);
  
  width: max-content;
  max-width: 90%;
  overflow-x: auto; /* Ekrana sığmazsa yana kaydırma sağlar */
}

.bottom-nav span {
  cursor: pointer;
  opacity: 0.6;
  transition: 0.2s;
  font-size: 16px; /* Mobilde çok büyük olmaması için */
  padding: 5px 10px; /* Dokunmatik alanı büyüttük */
  white-space: nowrap;
}

.bottom-nav span:hover {
  opacity: 1;
  color: #43627D;
}

.bottom-nav .active {
  opacity: 1;
  color: #43627D;
  font-weight: bold;
}

/* Masaüstü için CSS ayarları */
@media (min-width: 768px) {
  #plan-wrapper {
    width: 200px;
    bottom: 24px;
  }
  .bottom-nav {
    gap: 30px;
  }
  .bottom-nav span {
    font-size: 20px;
  }
}
</style>
</head>

<body>

<div class="brand">Şirket Adı</div>

<div class="ui">
  <div class="title" id="projectTitle">Proje Adı</div>
  <div class="subtitle" id="label">Mekan Adı</div>
</div>

<div class="fs" onclick="toggleFullscreen()">⛶</div>

<div id="panorama"></div>

<div id="plan-wrapper">
  <img id="plan" src="plan.png" alt="Kat Planı">
  <div id="planNodes"></div>
</div>

<div class="bottom-nav" id="nav"></div>

<script>

/* =========================
   GÜNCEL CMS (Açılar ve % Konumlar)
========================= */
const CMS = {
  living: {
    title: "Salon",
    image: "living.jpg",
    plan: { x: 40, y: 50 }, // X ve Y artık yüzde (%) olarak çalışır
    links: [
      { target: "kitchen", pitch: -5, yaw: 120 },
      { target: "garden", pitch: -2, yaw: -45 }
    ]
  },

  kitchen: {
    title: "Mutfak",
    image: "kitchen.jpg",
    plan: { x: 70, y: 80 },
    links: [
      { target: "living", pitch: 0, yaw: 180 }
    ]
  },

  garden: {
    title: "Bahçe",
    image: "garden.jpg",
    plan: { x: 45, y: 70 },
    links: [
      { target: "living", pitch: 5, yaw: 90 }
    ]
  }
};

/* =========================
   SAHNELERİ OLUŞTURMA
========================= */
const scenes = {};

Object.keys(CMS).forEach(key => {
  scenes[key] = {
    panorama: CMS[key].image,
    hotSpots: CMS[key].links.map(link => ({
      pitch: link.pitch,
      yaw: link.yaw,
      type: "scene",
      sceneId: link.target
    }))
  };
});

/* =========================
   PANNELLUM BAŞLATMA
========================= */
const viewer = pannellum.viewer('panorama', {
  default: {
    firstScene: "living",
    sceneFadeDuration: 800,
    autoLoad: true,
    showControls: false
  },
  scenes: scenes
});

/* =========================
   PLAN DÜĞÜMLERİ (Responsive)
========================= */
const planNodes = document.getElementById("planNodes");

Object.keys(CMS).forEach(k => {
  const n = document.createElement("div");
  n.className = "node " + k;
  // % işareti kullanarak her boyuttaki ekranda doğru yerde kalmasını sağlıyoruz
  n.style.left = CMS[k].plan.x + "%";
  n.style.top = CMS[k].plan.y + "%";
  n.onclick = () => go(k);
  planNodes.appendChild(n);
});

/* =========================
   ALT MENÜ 
========================= */
const nav = document.getElementById("nav");

Object.keys(CMS).forEach(k => {
  const s = document.createElement("span");
  s.innerText = CMS[k].title; 
  s.className = k;
  s.onclick = () => go(k);
  nav.appendChild(s);
});

/* =========================
   YÖNLENDİRME
========================= */
function go(scene) {
  viewer.loadScene(scene);
  setUI(scene);
}

/* =========================
   ARAYÜZ GÜNCELLEME
========================= */
function setUI(scene) {
  document.getElementById("label").innerText = CMS[scene].title;

  document.querySelectorAll(".bottom-nav span").forEach(el => {
    el.classList.remove("active");
  });

  const active = document.querySelector(".bottom-nav ." + scene);
  if (active) active.classList.add("active");
}

/* =========================
   TAM EKRAN
========================= */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen().catch(err => {
      console.log("Tam ekran hatası:", err);
    });
  } else {
    document.exitFullscreen();
  }
}

/* KLAVYE KISAYOLU */
document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "f") toggleFullscreen();
});

/* BAŞLAT */
setUI("living");

</script>

</body>
</html>
