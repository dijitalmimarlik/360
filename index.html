<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Villa 01 | 360 Plan System</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: black;
  font-family: Arial;
}

/* 360 viewer */
#panorama {
  width: 100%;
  height: 100vh;
}

/* UI */
.ui {
  position: absolute;
  top: 20px;
  left: 20px;
  color: white;
  z-index: 10;
}

/* PLAN */
#plan-wrapper {
  position: absolute;
  bottom: 20px;
  left: 20px;
  z-index: 20;
}

#plan {
  width: 220px;
  opacity: 0.9;
  display: block;
}

/* PLAN NODES */
.node {
  position: absolute;
  width: 14px;
  height: 14px;
  background: red;
  border: 2px solid white;
  border-radius: 50%;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="ui">
  <div>VILLA 01</div>
  <div id="label">Living Room</div>
</div>

<div id="panorama"></div>

<!-- PLAN -->
<div id="plan-wrapper">
  <img id="plan" src="plan.png">

  <!-- NODE POSITIONS (plan üzerinde elle ayarlanır) -->
  <div class="node" style="top:40px; left:60px;" onclick="go('living')"></div>
  <div class="node" style="top:80px; left:140px;" onclick="go('kitchen')"></div>
  <div class="node" style="top:140px; left:90px;" onclick="go('garden')"></div>
</div>

<script>
/* =========================
   GLOBAL VIEWER (FIXED)
========================= */
window.viewer = pannellum.viewer('panorama', {

  default: {
    firstScene: "living",
    sceneFadeDuration: 800
  },

  scenes: {

    living: {
      panorama: "living.jpg",
      hotSpots: [
        { pitch: 0, yaw: 120, type: "scene", text: "Kitchen", sceneId: "kitchen" },
        { pitch: 0, yaw: -80, type: "scene", text: "Garden", sceneId: "garden" }
      ]
    },

    kitchen: {
      panorama: "kitchen.jpg",
      hotSpots: [
        { pitch: 0, yaw: -100, type: "scene", text: "Living", sceneId: "living" }
      ]
    },

    garden: {
      panorama: "garden.jpg",
      hotSpots: [
        { pitch: 0, yaw: 90, type: "scene", text: "Living", sceneId: "living" }
      ]
    }

  }
});

/* =========================
   SCENE CHANGE FUNCTION
========================= */
function go(sceneName) {
  window.viewer.loadScene(sceneName);

  // UI label update (opsiyonel ama mimari sunum için önemli)
  document.getElementById("label").innerText =
    sceneName.charAt(0).toUpperCase() + sceneName.slice(1);
}
</script>

</body>
</html>
