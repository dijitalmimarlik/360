<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Proje Adı | CMS 360</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0b0b0b;
  font-family: Helvetica, Arial, sans-serif;
  color: white;
}

/* 360 */
#panorama {
  width: 100%;
  height: 100vh;
}

/* BRAND */
.brand {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 999;
  background: rgba(0,0,0,0.35);
  padding: 10px 14px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
  font-size: 13px;
  letter-spacing: 2px;
}

/* UI */
.ui {
  position: absolute;
  top: 70px;
  left: 20px;
  z-index: 999;
  background: rgba(0,0,0,0.35);
  padding: 10px 14px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
}

.ui .title {
  font-size: 14px;
  letter-spacing: 2px;
}

.ui .subtitle {
  font-size: 13px;
  opacity: 0.8;
  margin-top: 4px;
}

/* FULLSCREEN */
.fs {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 999;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
}

/* PLAN */
#plan-wrapper {
  position: absolute;
  bottom: 24px;
  left: 24px;
  z-index: 20;
}

#plan {
  width: 200px;
}

.node {
  position: absolute;
  width: 14px;
  height: 14px;
  background: red;
  border-radius: 50%;
  cursor: pointer;
  opacity: 0.85;
}

/* BOTTOM NAV */
.bottom-nav {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;

  display: flex;
  gap: 40px;

  font-size: 22px;
  letter-spacing: 1px;

  padding: 10px 20px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

.bottom-nav span {
  cursor: pointer;
  opacity: 0.6;
  transition: 0.2s;
}

.bottom-nav span:hover {
  opacity: 1;
  color: #43627D;
}

.bottom-nav .active {
  opacity: 1;
  color: #43627D;
}
</style>
</head>

<body>

<!-- BRAND -->
<div class="brand">şirket</div>

<!-- UI -->
<div class="ui">
  <div class="title" id="projectTitle">proje adı</div>
  <div class="subtitle" id="label">mekan adı</div>
</div>

<!-- FULLSCREEN -->
<div class="fs" onclick="toggleFullscreen()">⛶</div>

<!-- 360 -->
<div id="panorama"></div>

<!-- PLAN -->
<div id="plan-wrapper">
  <img id="plan" src="plan.png">
  <div id="planNodes"></div>
</div>

<!-- NAV -->
<div class="bottom-nav" id="nav"></div>

<script>

/* =========================
   CMS
========================= */
const CMS = {
  living: {
    title: "mekan adı",
    image: "living.jpg",
    plan: { x: 60, y: 40 },
    links: ["kitchen", "garden"]
  },

  kitchen: {
    title: "mekan adı",
    image: "kitchen.jpg",
    plan: { x: 140, y: 80 },
    links: ["living"]
  },

  garden: {
    title: "mekan adı",
    image: "garden.jpg",
    plan: { x: 90, y: 140 },
    links: ["living"]
  }
};

/* =========================
   BUILD SCENES
========================= */
const scenes = {};

Object.keys(CMS).forEach(key => {
  scenes[key] = {
    panorama: CMS[key].image,
    hotSpots: CMS[key].links.map(target => ({
      pitch: 0,
      yaw: 0,
      type: "scene",
      sceneId: target
    }))
  };
});

/* =========================
   INIT VIEWER
========================= */
const viewer = pannellum.viewer('panorama', {
  default: {
    firstScene: "living",
    sceneFadeDuration: 800,
    autoLoad: true,
    showControls: false
  },
  scenes: scenes
});

/* =========================
   PLAN AUTO
========================= */
const planNodes = document.getElementById("planNodes");

Object.keys(CMS).forEach(k => {
  const n = document.createElement("div");
  n.className = "node " + k;
  n.style.left = CMS[k].plan.x + "px";
  n.style.top = CMS[k].plan.y + "px";
  n.onclick = () => go(k);
  planNodes.appendChild(n);
});

/* =========================
   NAV AUTO (FIXED)
========================= */
const nav = document.getElementById("nav");

Object.keys(CMS).forEach(k => {
  const s = document.createElement("span");
  s.innerText = CMS[k].title; // ✅ FIX
  s.className = k;
  s.onclick = () => go(k);
  nav.appendChild(s);
});

/* =========================
   NAVIGATION
========================= */
function go(scene) {
  viewer.loadScene(scene);
  setUI(scene);
}

/* =========================
   UI UPDATE (FIXED)
========================= */
function setUI(scene) {
  document.getElementById("label").innerText = CMS[scene].title;

  document.querySelectorAll(".bottom-nav span").forEach(el => {
    el.classList.remove("active");
  });

  const active = document.querySelector(".bottom-nav ." + scene);
  if (active) active.classList.add("active");
}

/* =========================
   FULLSCREEN
========================= */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* KEYBOARD */
document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "f") toggleFullscreen();
});

/* INIT */
setUI("living");

</script>

</body>
</html>
