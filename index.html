<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Proje Adı | CMS 360</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>
body {
  margin: 0;
  overflow: hidden;
  background: #0b0b0b;
  font-family: Helvetica, Arial, sans-serif;
  color: white;
}

/* 360 */
#panorama {
  width: 100%;
  height: 100vh;
}

/* PANNELLUM MENÜSÜNÜN ÇIKMASINI KESİN OLARAK ENGELLEYEN CSS */
.pnm-context-menu, 
div[class*="context-menu"], 
.pnm-context-menu * {
  display: none !important;
  visibility: hidden !important;
  opacity: 0 !important;
  pointer-events: none !important;
}

/* BRAND */
.brand {
  position: absolute;
  top: 20px;
  left: 20px;
  z-index: 999;
  background: rgba(0,0,0,0.35);
  padding: 10px 14px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
  font-size: 13px;
  letter-spacing: 2px;
}

/* UI */
.ui {
  position: absolute;
  top: 70px;
  left: 20px;
  z-index: 999;
  background: rgba(0,0,0,0.35);
  padding: 10px 14px;
  border-radius: 10px;
  backdrop-filter: blur(10px);
}

.ui .title {
  font-size: 14px;
  letter-spacing: 2px;
}

.ui .subtitle {
  font-size: 13px;
  opacity: 0.8;
  margin-top: 4px;
}

/* FULLSCREEN */
.fs {
  position: absolute;
  top: 20px;
  right: 20px;
  z-index: 999;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 18px;
}

/* VR / GYRO BUTTON (YENİ) */
.vr-btn {
  position: absolute;
  top: 20px;
  right: 66px;
  z-index: 999;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.2);
  border-radius: 8px;
  cursor: pointer;
  font-size: 16px;
  transition: background 0.2s;
}

/* PLAN */
#plan-wrapper {
  position: absolute;
  bottom: 24px;
  left: 24px;
  z-index: 20;
}

#plan {
  width: 200px;
}

.node {
  position: absolute;
  width: 14px;
  height: 14px;
  background: red;
  border-radius: 50%;
  cursor: pointer;
  opacity: 0.85;
}

/* BOTTOM NAV */
.bottom-nav {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 30;

  display: flex;
  gap: 40px;

  font-size: 22px;
  letter-spacing: 1px;

  padding: 10px 20px;
  background: rgba(0,0,0,0.35);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  backdrop-filter: blur(10px);
}

.bottom-nav span {
  cursor: pointer;
  opacity: 0.6;
  transition: 0.2s;
}

.bottom-nav span:hover {
  opacity: 1;
  color: #43627D;
}

.bottom-nav .active {
  opacity: 1;
  color: #43627D;
 
}

/* MOBİL VE TABLET UYUMLULUK AYARLARI */
@media (max-width: 768px) {
  .brand {
    top: 12px;
    left: 12px;
    font-size: 11px;
    padding: 6px 10px;
  }
  
  .ui {
    top: 55px;
    left: 12px;
    padding: 6px 10px;
  }
  
  .ui .title { font-size: 11px; }
  .ui .subtitle { font-size: 11px; }
  
  .fs {
    top: 12px;
    right: 12px;
    width: 32px;
    height: 32px;
    font-size: 14px;
  }

  /* Mobil VR Buton Konumu */
  .vr-btn {
    top: 12px;
    right: 50px;
    width: 32px;
    height: 32px;
    font-size: 14px;
  }

  .bottom-nav {
    bottom: 12px;
    width: calc(100% - 32px);
    max-width: 400px;
    gap: 15px;
    font-size: 14px;
    padding: 8px 12px;
    justify-content: center;
    flex-wrap: wrap;
  }

  #plan-wrapper {
    bottom: 65px;
    left: 12px;
    transform: scale(0.7);
    transform-origin: bottom left;
  }
}
</style>
</head>

<body>

<div class="brand">şirket</div>

<div class="ui">
  <div class="title" id="projectTitle">proje adı</div>
  <div class="subtitle" id="label">mekan adı</div>
</div>

<div class="vr-btn" onclick="toggleVR()">🕶️</div>
<div class="fs" onclick="toggleFullscreen()">⛶</div>

<div id="panorama"></div>

<div id="plan-wrapper">
  <img id="plan" src="plan.png">
  <div id="planNodes"></div>
</div>

<div class="bottom-nav" id="nav"></div>

<script>

/* =========================
   CMS
========================= */
const CMS = {
  living: {
    title: "Salon",
    image: "living.jpg",
    plan: { x: 60, y: 40 },
    links: ["kitchen", "garden"]
  },

  kitchen: {
    title: "Mutfak",
    image: "kitchen.jpg",
    plan: { x: 140, y: 80 },
    links: ["living"]
  },

  garden: {
    title: "Bahçe",
    image: "garden.jpg",
    plan: { x: 90, y: 140 },
    links: ["living"]
  }
};

/* =========================
   BUILD SCENES
========================= */
const scenes = {};

Object.keys(CMS).forEach(key => {
  scenes[key] = {
    panorama: CMS[key].image,
    hotSpots: CMS[key].links.map(target => ({
      pitch: 0,
      yaw: 0,
      type: "scene",
      sceneId: target
    }))
  };
});

/* =========================
   INIT VIEWER
========================= */
const viewer = pannellum.viewer('panorama', {
  default: {
    firstScene: "living",
    sceneFadeDuration: 800,
    autoLoad: true,
    showControls: false,
    loadingLabel: "Mekan Yükleniyor..."
  },
  scenes: scenes
});

/* =========================
   PLAN AUTO
========================= */
const planNodes = document.getElementById("planNodes");

Object.keys(CMS).forEach(k => {
  const n = document.createElement("div");
  n.className = "node " + k;
  n.style.left = CMS[k].plan.x + "px";
  n.style.top = CMS[k].plan.y + "px";
  n.onclick = () => go(k);
  planNodes.appendChild(n);
});

/* =========================
   NAV AUTO
========================= */
const nav = document.getElementById("nav");

Object.keys(CMS).forEach(k => {
  const s = document.createElement("span");
  s.innerText = CMS[k].title;
  s.className = k;
  s.onclick = () => go(k);
  nav.appendChild(s);
});

/* =========================
   NAVIGATION
========================= */
function go(scene) {
  viewer.loadScene(scene);
  setUI(scene);
}

/* =========================
   UI UPDATE
========================= */
function setUI(scene) {
  document.getElementById("label").innerText = CMS[scene].title;

  document.querySelectorAll(".bottom-nav span").forEach(el => {
    el.classList.remove("active");
  });

  const active = document.querySelector(".bottom-nav ." + scene);
  if (active) active.classList.add("active");
}

/* =========================
   FULLSCREEN
========================= */
function toggleFullscreen() {
  if (!document.fullscreenElement) {
    document.documentElement.requestFullscreen();
  } else {
    document.exitFullscreen();
  }
}

/* KEYBOARD */
document.addEventListener("keydown", e => {
  if (e.key.toLowerCase() === "f") toggleFullscreen();
});

/* INIT */
setUI("living");

/* =======================================================
   SAĞ TIKLAMAYI VE KÜTÜPHANE MENÜSÜNÜ TAMAMEN KİLİTLEYEN KOD
   ======================================================= */
document.addEventListener('contextmenu', function(e) {
  e.preventDefault();
  e.stopPropagation();
  e.stopImmediatePropagation();
}, true);


/* =======================================================
   VR / JİROSKOP (HAREKET) MODU FONKSİYONLARI (YENİ)
   ======================================================= */
let vrActive = false;

function toggleVR() {
  // Cihazın jiroskop desteği kontrol edilir
  if (!viewer.isOrientationSupported()) {
    alert("Bu cihazda veya tarayıcıda hareket sensörü desteklenmiyor veya engellenmiş.");
    return;
  }

  // Modern iOS (iPhone) cihazlar için kullanıcı izni tetikleme mekanizması
  if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
    DeviceOrientationEvent.requestPermission()
      .then(permissionState => {
        if (permissionState === 'granted') {
          handleVRToggle();
        } else {
          alert("Sanal turu hareketle gezebilmek için sensör izni vermeniz gerekmektedir.");
        }
      })
      .catch(console.error);
  } else {
    // Android ve diğer standart tarayıcılar için doğrudan başlatma
    handleVRToggle();
  }
}

function handleVRToggle() {
  const vrBtn = document.querySelector('.vr-btn');
  if (!vrActive) {
    viewer.startOrientation();
    vrActive = true;
    vrBtn.style.background = "#43627D"; // Aktif olduğunda buton rengi mavi olur
  } else {
    viewer.stopOrientation();
    vrActive = false;
    vrBtn.style.background = "rgba(0,0,0,0.35)"; // Kapatıldığında eski haline döner
  }
}

</script>

</body>
</html>
