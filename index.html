<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>KUR | 360 Studio</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: black;
    }

    #panorama {
      width: 100%;
      height: 100vh;
    }

    /* minimal mimari UI */
    .ui {
      position: absolute;
      top: 20px;
      left: 20px;
      z-index: 10;
      color: white;
      font-family: Arial;
      letter-spacing: 1px;
    }
  </style>
</head>

<body>

<div class="ui">
  <div>PROJECT: VILLA 01</div>
  <div>SPACE: LIVING ROOM</div>
</div>

<div id="panorama"></div>

<script>
pannellum.viewer('panorama', {
  type: "equirectangular",
  panorama: "assets/1.jpg",
  autoLoad: true,

  showControls: true,

  compass: true,

  // VR hazırlığı (Pannellum WebVR destekliyor)
  hfov: 110,
  minHfov: 50,
  maxHfov: 120
});
</script>

</body>
</html>
