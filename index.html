<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Villa 01 | Plan + 360</title>

<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
<script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

<style>
body {
  margin:0;
  overflow:hidden;
  background:black;
}

#panorama {
  width:100%;
  height:100vh;
}

/* PLAN OVERLAY */
#plan {
  position:absolute;
  bottom:20px;
  left:20px;
  width:220px;
  opacity:0.9;
  z-index:10;
}

.node {
  position:absolute;
  width:12px;
  height:12px;
  background:red;
  border-radius:50%;
  cursor:pointer;
  border:2px solid white;
}

#container {
  position:relative;
}
</style>
</head>

<body>

<div id="container">
  <div id="panorama"></div>

  <!-- PLAN -->
  <div id="plan-wrapper" style="position:absolute; bottom:20px; left:20px;">
    <img id="plan" src="plan.png">

    <!-- NODELAR -->
    <div class="node" style="top:40px; left:60px;" onclick="loadScene('living')"></div>
    <div class="node" style="top:80px; left:140px;" onclick="loadScene('kitchen')"></div>
    <div class="node" style="top:140px; left:90px;" onclick="loadScene('garden')"></div>
  </div>
</div>

<script>

let viewer = pannellum.viewer('panorama', {

  default: {
    firstScene: "living",
    sceneFadeDuration: 800
  },

  scenes: {

    living: {
      panorama: "living.jpg",
      hotSpots: [
        { pitch: 0, yaw: 120, type: "scene", text: "Kitchen", sceneId: "kitchen" },
        { pitch: 0, yaw: -80, type: "scene", text: "Garden", sceneId: "garden" }
      ]
    },

    kitchen: {
      panorama: "kitchen.jpg",
      hotSpots: [
        { pitch: 0, yaw: -100, type: "scene", text: "Living", sceneId: "living" }
      ]
    },

    garden: {
      panorama: "garden.jpg",
      hotSpots: [
        { pitch: 0, yaw: 90, type: "scene", text: "Living", sceneId: "living" }
      ]
    }

  }

});

function loadScene(scene){
  viewer.loadScene(scene);
}

</script>

</body>
</html>
