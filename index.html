<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Villa 01 | Spatial Tour</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.css">
  <script src="https://cdn.jsdelivr.net/npm/pannellum/build/pannellum.js"></script>

  <style>
    body { margin:0; background:black; }
    #panorama { width:100%; height:100vh; }

    .ui {
      position:absolute;
      top:20px;
      left:20px;
      color:white;
      font-family:Arial;
      z-index:10;
    }
  </style>
</head>

<body>

<div class="ui">
  <h3>VILLA 01</h3>
  <div id="label">Living Room</div>
</div>

<div id="panorama"></div>

<script>

let viewer = pannellum.viewer('panorama', {

  default: {
    firstScene: "living",
    sceneFadeDuration: 1000
  },

  scenes: {

    living: {
      panorama: "living.jpg",
      title: "Living Room",

      hotSpots: [
        {
          pitch: 0,
          yaw: 120,
          type: "scene",
          text: "Kitchen",
          sceneId: "kitchen"
        },
        {
          pitch: 0,
          yaw: -60,
          type: "scene",
          text: "Garden",
          sceneId: "garden"
        }
      ]
    },

    kitchen: {
      panorama: "kitchen.jpg",
      title: "Kitchen",

      hotSpots: [
        {
          pitch: 0,
          yaw: -100,
          type: "scene",
          text: "Back to Living",
          sceneId: "living"
        }
      ]
    },

    garden: {
      panorama: "garden.jpg",
      title: "Garden",

      hotSpots: [
        {
          pitch: 0,
          yaw: 90,
          type: "scene",
          text: "Back to Living",
          sceneId: "living"
        }
      ]
    }

  }

});

</script>

</body>
</html>
